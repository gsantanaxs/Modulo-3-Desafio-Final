<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAFIO FINAL: A Armadura de Ouro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚔️ DESAFIO FINAL: A Armadura de Ouro ⚔️</h1>
            <p>Descubra qual Cavaleiro de Ouro você é!</p>
        </header>

        <div class="input-section">
            <label for="dataNascimento">Digite sua Data de Nascimento:</label>
            <input type="date" id="dataNascimento" placeholder="DD/MM/AAAA">
            <button id="btnDescobrir">Descobrir</button>
        </div>

        <div id="resultado" class="resultado hidden">
            <div class="cavaleiro-info">
                <div id="imagemCavaleiro" class="emoji-cavaleiro"></div>
                <div class="info-text">
                    <h2 id="nomeCavaleiro"></h2>
                    <p id="sinalZodiaco"></p>
                    <p id="descricaoPoder"></p>
                    <p id="statusVida"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
